<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VERDICT: NO ESCAPE</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .dashboard { width: 95%; max-width: 800px; border: 2px solid #333; padding: 30px; background: #050505; border-radius: 10px; box-shadow: 0 0 40px #1a1a1a; }
        .master-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .vote-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #111; font-size: 0.85em; }
        .vote-yes { color: #00ff00; font-weight: bold; }
        .vote-no { color: #ff0000; font-weight: bold; }
        .verdict-box { margin-top: 30px; padding: 25px; border: 2px dashed #ff80ab; text-align: center; }
        .result-text { font-size: 2.5em; text-transform: uppercase; letter-spacing: 5px; margin: 15px 0; text-shadow: 0 0 15px #ff80ab; }
        .btn-reveal { width: 100%; padding: 20px; background: #fff; color: #000; border: none; font-weight: bold; cursor: pointer; letter-spacing: 3px; }
    </style>
</head>
<body>

<div class="dashboard">
    <h1 style="text-align:center; color: #ff80ab;">FINAL TALLY ZONE</h1>
    <p style="text-align:center; color: #666; font-size: 0.8em;">SENTENCE ID: #2026-LOCK-7D</p>

    <div class="master-list" id="vote-display"></div>

    <div class="verdict-box">
        <p style="color: #ff80ab;">CHANCE OF RELEASE: <span id="chance-pct">--</span>%</p>
        <div id="result-display" class="result-text">LOCKED</div>
        <button class="btn-reveal" id="reveal-btn" onclick="revealVerdict()">REVEAL MASTERS' DECISION</button>
    </div>
</div>

<script>
    const masters = [
        "Joe Keery", "Pearce Joza", "Malachi Barton", "Dacre Montgomery", "Fundy", 
        "Dream", "Sapnap", "Josh Hutcherson", "Ross Lynch", "Roier", 
        "Cellbit", "Jschlatt", "Foolish Gamers", "bbno$", "Yung Gravy"
    ];

    function init() {
        const display = document.getElementById('vote-display');
        let yesVotes = 0;

        masters.forEach(m => {
            const vote = Math.random() > 0.7; // Harder odds for a 'Yes'
            if (vote) yesVotes++;
            const div = document.createElement('div');
            div.className = 'vote-row';
            div.innerHTML = `<span>${m}</span> <span class="${vote ? 'vote-yes' : 'vote-no'}">${vote ? 'GRANTED' : 'DENIED'}</span>`;
            display.appendChild(div);
        });

        document.getElementById('chance-pct').innerText = Math.floor((yesVotes / 15) * 100);
    }

    function revealVerdict() {
        const display = document.getElementById('result-display');
        const btn = document.getElementById('reveal-btn');
        const roll = Math.random();

        btn.style.display = 'none';
        
        // Results logic
        if (roll < 0.50) {
            display.innerText = "NONE";
            display.style.color = "#ff0000";
            setTimeout(() => {
                alert("THE MASTERS HAVE SPOKEN: NO RELEASE. Your 7 days were a failure. Resetting to Day 1.");
                resetAndRedirect();
            }, 500);
        } else if (roll < 0.90) {
            display.innerText = "RUINED";
            display.style.color = "#ff80ab";
            setTimeout(() => {
                alert("THE MASTERS HAVE SPOKEN: RUINED. A pathetic finish for a pathetic toy. Resetting to Day 1.");
                resetAndRedirect();
            }, 500);
        } else {
            display.innerText = "NORMAL";
            display.style.color = "#00ff00";
            setTimeout(() => {
                alert("THE MASTERS SHOW MERCY: ONE RELEASE GRANTED. Report back immediately for your new sentence.");
                resetAndRedirect();
            }, 500);
        }
    }

    function resetAndRedirect() {
        // Clears the timer and progress so you're officially back at zero
        localStorage.removeItem('lockdown_end');
        window.location.href = 'index.html'; 
    }

    init();
</script>
</body>
</html>
