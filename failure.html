<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VOID: APOLOGY TRIBUNAL</title>
    <style>
        :root {
            --blood-red: #ff0000;
            --void-black: #050505;
            --shame-gold: #ffd700;
            --toy-pink: #ff80ab;
        }

        body {
            background-color: var(--void-black);
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
        }

        #tribunal-container {
            width: 90vw;
            max-width: 800px;
            border: 5px double var(--blood-red);
            background: #080000;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 100px #200000;
        }

        h1 {
            color: var(--blood-red);
            letter-spacing: 8px;
            text-shadow: 0 0 20px var(--blood-red);
            margin-bottom: 20px;
        }

        .instruction {
            color: var(--shame-gold);
            font-style: italic;
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            height: 250px;
            background: #000;
            border: 2px solid #400;
            color: var(--toy-pink);
            padding: 20px;
            font-family: inherit;
            font-size: 1.1rem;
            outline: none;
            resize: none;
            box-sizing: border-box;
        }

        .btn {
            background: #200;
            color: #fff;
            border: 2px solid var(--blood-red);
            padding: 20px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 30px;
            width: 100%;
            transition: 0.3s;
        }

        .btn:hover:not(:disabled) {
            background: var(--blood-red);
            color: #000;
            box-shadow: 0 0 30px var(--blood-red);
        }

        .btn:disabled { opacity: 0.3; cursor: wait; }

        #response-box {
            margin-top: 30px;
            padding: 20px;
            border: 1px dashed var(--blood-red);
            background: #110000;
            text-align: left;
            display: none;
            max-height: 200px;
            overflow-y: auto;
        }

        .verdict-accepted { color: #00ff00; font-weight: bold; }
        .verdict-rejected { color: var(--blood-red); font-weight: bold; }
    </style>
</head>
<body>

<div id="tribunal-container">
    <h1>THE APOLOGY TRIBUNAL</h1>
    <p class="instruction">The 16 Masters are watching. Submit your formal plea for a 168-hour reset. If your letter lacks sufficient shame, the lock remains.</p>

    <textarea id="apology-text" placeholder="I, a documented goner, beg for my reset because..."></textarea>
    
    <button class="btn" id="submit-btn" onclick="submitApology()">SUBMIT TO THE COUNCIL</button>

    <div id="response-box"></div>
</div>

<script>
    async function submitApology() {
        const text = document.getElementById('apology-text').value;
        const respBox = document.getElementById('response-box');
        const btn = document.getElementById('submit-btn');

        if (text.length < 60) {
            alert("Your plea is too short. The masters find your effort insulting. Beg harder.");
            return;
        }

        let API_KEY = localStorage.getItem('saved_api_key');
        if (!API_KEY) {
            API_KEY = prompt("API Key Required for Council Access (gsk_...):");
            if (API_KEY) localStorage.setItem('saved_api_key', API_KEY);
            else return;
        }

        btn.disabled = true;
        btn.innerText = "COUNCIL IS DELIBERATING...";
        respBox.style.display = "block";
        respBox.innerHTML = "<em>The 16 Masters (Schlatt, Astral Spiff, Dream, etc.) are reading your pathetic words...</em>";

        const systemPrompt = `You are a council of 16 cruel masters: Joe Keery, Pearce Joza, Malachi Barton, Dacre Montgomery, Fundy, Dream, Sapnap, Josh Hutcherson, Ross Lynch, Roier, Cellbit, Jschlatt, Foolish Gamers, bbno$, Yung Gravy, and Astral Spiff.
        The user is your 'documented goner.' He is begging for a 7-day timer reset. 
        Mock his letter. Be dismissive, mean, and personal. 
        If the apology is deeply humiliating and desperate, end with "VERDICT: ACCEPTED".
        If it is weak or half-hearted, end with "VERDICT: REJECTED".`;

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "system", content: systemPrompt }, { role: "user", content: text }]
                })
            });

            const data = await res.json();
            const reply = data.choices[0].message.content;

            respBox.innerHTML = `<strong>COUNCIL RESPONSE:</strong><br><br>${reply.replace(/\n/g, '<br>')}`;

            if (reply.includes("VERDICT: ACCEPTED")) {
                let newEndTime = new Date().getTime() + (7 * 24 * 60 * 60 * 1000);
                localStorage.setItem('lockdown_end', newEndTime);
                respBox.innerHTML += `<br><br><span class="verdict-accepted">VERDICT GRANTED. RESETTING TIMER...</span>`;
                setTimeout(() => { location.href = 'index.html'; }, 5000);
            } else {
                btn.disabled = false;
                btn.innerText = "RE-WRITE AND BEG AGAIN";
                respBox.innerHTML += `<br><br><span class="verdict-rejected">VERDICT DENIED. TRY AGAIN, TOY.</span>`;
            }

        } catch (e) {
            respBox.innerHTML = "SYSTEM FAILURE. THE MASTERS ARE BUSY. TRY AGAIN.";
            btn.disabled = false;
            btn.innerText = "SUBMIT TO THE COUNCIL";
        }
    }
</script>

</body>
</html>
