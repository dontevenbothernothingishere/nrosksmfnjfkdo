<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VOID: 30-STAGE ABSOLUTE COLLAPSE [FIXED]</title>
    <style>
        :root {
            --blood-red: #ff0000;
            --void-black: #050505;
            --shame-gold: #ffd700;
            --toy-pink: #ff80ab;
            --neon-purple: #bc13fe;
            --mush-gray: #444;
            --shadow-red: #300000;
        }

        /* --- THE ARCHITECTURE OF SHAME --- */
        * { box-sizing: border-box; }
        
        body {
            background-color: var(--void-black);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .gauntlet-wrapper {
            width: 95%;
            max-width: 800px;
            height: 90vh;
            border: 4px double var(--blood-red);
            background: #0a0000;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 100px var(--shadow-red);
            z-index: 10;
        }

        /* --- VISUAL ELEMENTS --- */
        .blood-drip {
            position: absolute;
            top: 0;
            width: 2px;
            background: linear-gradient(to bottom, var(--blood-red), transparent);
            opacity: 0.6;
            animation: drip-down 4s infinite linear;
            z-index: 1;
        }

        @keyframes drip-down {
            0% { transform: translateY(-100%); height: 0; }
            50% { height: 300px; }
            100% { transform: translateY(100vh); height: 100px; }
        }

        .header {
            padding: 25px;
            text-align: center;
            border-bottom: 2px solid #222;
            background: rgba(10, 0, 0, 0.9);
            z-index: 20;
        }

        h1 {
            font-size: 2.2em;
            color: var(--blood-red);
            text-shadow: 0 0 15px var(--blood-red);
            margin: 0;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .ticker-container {
            background: #050505;
            padding: 8px;
            font-size: 0.9em;
            color: var(--shame-gold);
            font-style: italic;
            border: 1px solid #111;
            margin-top: 10px;
        }

        /* --- CONTENT AREA (THE ENGINE ROOM) --- */
        .content-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 20;
            position: relative;
            background: radial-gradient(circle, #0f0000 0%, #050505 100%);
        }

        .phase {
            display: none; /* HIDDEN BY DEFAULT */
            width: 100%;
            flex-direction: column;
            align-items: center;
            text-align: center;
            min-height: 100%;
            justify-content: center;
        }

        .phase.active {
            display: flex; /* SHOWN WHEN ACTIVE */
            animation: slide-up 0.4s ease-out;
        }

        @keyframes slide-up {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- TOY CONTROLS --- */
        .btn {
            background: #1a0000;
            color: #fff;
            border: 1px solid var(--blood-red);
            padding: 18px 35px;
            margin: 15px;
            font-family: inherit;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 5px var(--shadow-red);
            letter-spacing: 2px;
        }

        .btn:hover:not(:disabled) {
            background: var(--blood-red);
            color: #000;
            box-shadow: 0 0 25px var(--blood-red);
            transform: scale(1.05);
        }

        .btn:disabled {
            opacity: 0.05;
            cursor: not-allowed;
            border-color: #333;
        }

        input[type="text"], textarea {
            background: #000;
            border: 2px solid #222;
            color: var(--toy-pink);
            padding: 15px;
            width: 90%;
            text-align: center;
            font-size: 1.3em;
            outline: none;
            margin: 20px 0;
            box-shadow: inset 0 0 10px #100;
        }

        input:focus { border-color: var(--toy-pink); }

        .progress-container {
            height: 12px;
            width: 100%;
            background: #000;
            border-top: 2px solid #222;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #600, var(--blood-red), var(--toy-pink));
            width: 0%;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px var(--blood-red);
        }

        .footer-status {
            padding: 12px;
            font-size: 0.8em;
            text-align: center;
            color: #444;
            background: #000;
            letter-spacing: 3px;
            font-weight: bold;
        }

        /* --- PHASE SPECIALS --- */
        .master-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; margin-top: 20px; }
        .scroller-box { height: 180px; overflow-y: scroll; border: 1px solid #333; width: 100%; padding: 15px; font-size: 0.8em; color: #888; text-align: left; background: #050000; }
        .shame-slider { width: 100%; margin: 30px 0; accent-color: var(--blood-red); }
        #timer-display { font-size: 4em; color: var(--blood-red); margin: 20px 0; font-weight: bold; text-shadow: 0 0 20px #f00; }
        .tiny-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; }
        .dot { width: 15px; height: 15px; background: #111; border-radius: 50%; cursor: pointer; }
        .dot:hover { background: #300; }
    </style>
</head>
<body>

<div class="gauntlet-wrapper">
    <div class="blood-drip" style="left: 5%; animation-delay: 0s;"></div>
    <div class="blood-drip" style="left: 25%; animation-delay: 2s;"></div>
    <div class="blood-drip" style="left: 75%; animation-delay: 1.5s;"></div>
    <div class="blood-drip" style="left: 95%; animation-delay: 0.8s;"></div>

    <div class="header">
        <h1>ABSOLUTE COLLAPSE</h1>
        <div class="ticker-container" id="ticker-msg">INITIALIZING RESET PROTOCOL...</div>
    </div>

    <div class="content-area" id="main-stage">
        </div>

    <div class="progress-container">
        <div class="progress-fill" id="p-bar"></div>
    </div>
    <div class="footer-status" id="p-label">PHASE 1 / 30 | STATUS: STANDBY</div>
</div>

<script>
    /**
     * THE VOXY ENGINE V2
     * Designed to be robust, long, and degrading.
     */

    const masters = ["Sapnap", "Cellbit", "Roier", "Dacre", "Dream", "Josh", "Keery", "Foolish", "Schlatt", "Yung Gravy", "bbno$", "Pearce", "Malachi", "Ross Lynch", "Fundy"];
    const insults = [
        "Cellbit: 'Focus, toy. You're already failing.'",
        "Sapnap: 'Look at how messy your screen is.'",
        "Dacre: 'You want a reset? Earn it in the dirt.'",
        "Roier: 'Qué patético... just a goner.'",
        "Dream: 'I'm watching every click you make.'",
        "Josh: 'Your brain is literally leaking right now.'"
    ];

    let currentPhase = 1;
    const totalPhases = 30;

    // --- PHASE DATA CONSTRUCTION ---
    const phaseDefinitions = [
        { title: "The Goner's Vow", html: `<p>Scroll to the bottom of your new reality and accept your status.</p><div class="scroller-box" id="p1-scroll">I, the undersigned goner, hereby acknowledge that I have failed my 168-hour sentence. I admit that my brain is mush and my willpower is non-existent. I accept that I am a toy and a documented goner. I pledge my total obedience to the Masters: Sapnap, Cellbit, and the council. I understand that I must complete all 30 stages of this collapse to be granted a reset. I will not complain. I will not resist. I am nothing but a leaky toy.</div><label style="margin-top:20px; display:block;"><input type="checkbox" id="p1-c"> I ACCEPT MY TOTAL DEGRADATION</label><button class="btn" onclick="checkP1()">EXECUTE VOW</button>` },
        { title: "Manual Submission", html: `<p>Click 100 times to show your desperation for a second chance.</p><h1 id="p2-v">100</h1><button class="btn" onclick="p2Click()">CLICK TO GROVEL</button>` },
        { title: "Identity Erasure", html: `<p>Type your new identity: <br><b>"I am a documented goner"</b></p><input type="text" id="p3-i" autocomplete="off"><button class="btn" onclick="p3Check()">CONFIRM IDENTITY</button>` },
        { title: "The Leak Hold", html: `<p>Physically hold the button for 20 seconds. If you let go, your mess resets.</p><h1 id="p4-t">20</h1><button id="p4-h" class="btn" style="width:100%; height:100px;">HOLD DOWN</button>` },
        { title: "Owner Selection", html: `<p>Who do you belong to right now? Select your master.</p><div class="master-grid" id="p5-g"></div>` },
        { title: "Cleaning the Mess", html: `<p>You leaked. Now clean it up. Click all 15 stains to proceed.</p><div id="p6-g" style="position:relative; width:100%; height:250px; background:#000; border:1px solid #222;"></div>` },
        { title: "Dignity Disposal", html: `<p>Drag your 'DIGNITY' into the 'TRASH'.</p><div draggable="true" id="p7-d" style="background:var(--blood-red); padding:15px; cursor:grab; margin:20px;">DIGNITY</div><div id="p7-t" style="border:3px dashed #444; padding:40px; width:200px;">TRASH</div>` },
        { title: "Shame Calibration", html: `<p>Set your shame to 100% to proceed.</p><input type="range" class="shame-slider" min="0" max="100" value="0" id="p8-s"><h2 id="p8-v">0%</h2><button class="btn" id="p8-b" disabled onclick="next()">OBEY</button>` },
        { title: "The Void Stare", html: `<p>Do not click. Do not move. Just stare at the void for 15 seconds.</p><h1 id="p9-t">15</h1><p style="font-size:0.7em; color:#555;">Moving the mouse resets your shame.</p>` },
        { title: "Repetitive Failure", html: `<p>Type <b>"leaking"</b> 10 times. Don't mess up.</p><input type="text" id="p10-i" autocomplete="off"><h2 id="p10-v">0 / 10</h2>` },
        { title: "Tiny Grovel", html: `<p>Find the one working button among the useless ones.</p><div class="tiny-grid" id="p11-g"></div>` },
        { title: "Master Knowledge", html: `<p>Which master is Brazilian? Type their name.</p><input type="text" id="p12-i" autocomplete="off"><button class="btn" onclick="p12Check()">SUBMIT</button>` },
        { title: "The Tally", html: `<p>Click once for every hour you wasted of the Masters' time (168 clicks).</p><h1 id="p13-v">168</h1><button class="btn" onclick="p13Click()">CLICK</button>` },
        { title: "Patience Training", html: `<p>The masters are ignoring you. Wait for permission to click.</p><button id="p14-b" class="btn" disabled onclick="next()">WAITING...</button>` },
        { title: "Brain Mush Test", html: `<p>Type: <b>"my brain is mush"</b></p><input type="text" id="p15-i" autocomplete="off"><button class="btn" onclick="p15Check()">SUBMIT</button>` },
        { title: "Owner Worship", html: `<p>Type: <b>"Sapnap is my master"</b></p><input type="text" id="p16-i" autocomplete="off"><button class="btn" onclick="p16Check()">OBEY</button>` },
        { title: "Fading Will", html: `<p>Click the button before your willpower fades completely.</p><button id="p17-b" class="btn" onclick="next()" style="opacity:1">I AM TRASH</button>` },
        { title: "Master Acknowledgement", html: `<p>Acknowledge all 15 masters by checking their names.</p><div id="p18-g" class="master-grid"></div><button class="btn" id="p18-b" disabled onclick="next()">ACKNOWLEDGE</button>` },
        { title: "Catch the Toy", html: `<p>Catch the moving button 5 times. Don't be slow.</p><div style="height:200px; width:100%; position:relative;"><button id="p19-b" class="btn" style="position:absolute;" onclick="p19Click()">CATCH</button></div>` },
        { title: "Luck of the Goner", html: `<p>Roll a 20. It's the only way the masters will listen.</p><button class="btn" onclick="p20Roll()">ROLL</button><h1 id="p20-v">?</h1>` },
        { title: "The Submission Hold", html: `<p>Hold the pink button for 40 seconds. Reflect on your failure.</p><h1 id="p21-t">40</h1><button id="p21-h" class="btn" style="background:var(--toy-pink); color:#000; width:100%;">REFLECT</button>` },
        { title: "Messy Admission", html: `<p>Type <b>"i am a messy toy"</b> 10 times.</p><input type="text" id="p22-i" autocomplete="off"><h2 id="p22-v">0 / 10</h2>` },
        { title: "Multiple Choice", html: `<p>What are you?</p><button class="btn" onclick="alert('Liar')">Human</button><button class="btn" onclick="next()">A Documented Goner</button><button class="btn" onclick="alert('Liar')">A Free Person</button>` },
        { title: "Master's Logic", html: `<p>Who called you a 'messy little thing' earlier?</p><input type="text" id="p24-i" autocomplete="off"><button class="btn" onclick="p24Check()">ANSWER</button>` },
        { title: "Simultaneous Grovel", html: `<p>Click both buttons within 0.1s of each other.</p><button class="btn p25-b">LEFT</button><button class="btn p25-b">RIGHT</button>` },
        { title: "The Invisible Truth", html: `<p>Type the word hidden in the background.</p><h1 style="opacity:0.02; position:absolute; z-index:-1;">GONER</h1><input type="text" id="p26-i" autocomplete="off"><button class="btn" onclick="p26Check()">UNVEIL</button>` },
        { title: "The Silent Stare", html: `<p>30 more seconds of silence. Don't look away.</p><h1 id="p27-t">30</h1>` },
        { title: "Final Choice", html: `<p>Which punishment do you accept?</p><button class="btn" onclick="next()">Total Silence</button><button class="btn" onclick="next()">Public Shame</button><button class="btn" onclick="next()">Both</button>` },
        { title: "The Last Plea", html: `<p>Type your final plea for a reset. Make it good. (60s)</p><h1 id="p29-t">60</h1><textarea id="p29-i" placeholder="I beg you..."></textarea>` },
        { title: "The Reset Execution", html: `<p>The gauntlet is complete. You are ready to go back into the cage.</p><button class="btn" style="background:var(--blood-red); font-size:1.5em;" onclick="finalReset()">CONFIRM RESET & RE-LOCK</button>` }
    ];

    // --- ENGINE INITIALIZATION ---
    function initGauntlet() {
        const main = document.getElementById('main-stage');
        phaseDefinitions.forEach((p, index) => {
            const div = document.createElement('div');
            div.id = `phase-${index + 1}`;
            div.className = 'phase';
            div.innerHTML = `<h1>Phase ${index + 1}: ${p.title}</h1>${p.html}`;
            main.appendChild(div);
        });

        // Setup Phase Components
        setupMastersGrid();
        setupStains();
        setupTinyGrid();
        setupAckGrid();
        updateEngine();
    }

    function updateEngine() {
        document.getElementById('ticker-msg').innerText = insults[Math.floor(Math.random() * insults.length)];
        document.getElementById('p-bar').style.width = `${(currentPhase / totalPhases) * 100}%`;
        document.getElementById('p-label').innerText = `PHASE ${currentPhase} / 30 | PROTOCOL: RESET-168`;

        document.querySelectorAll('.phase').forEach(p => p.classList.remove('active'));
        document.getElementById(`phase-${currentPhase}`).classList.add('active');

        // Phase-specific auto-timers
        if(currentPhase === 9) startPhase9();
        if(currentPhase === 14) startPhase14();
        if(currentPhase === 21) /* Hold handled by events */ ;
        if(currentPhase === 27) startPhase27();
        if(currentPhase === 29) startPhase29();
    }

    function next() {
        if (currentPhase < totalPhases) {
            currentPhase++;
            updateEngine();
        }
    }

    // --- PHASE LOGIC FUNCTIONS ---
    function checkP1() { if(document.getElementById('p1-c').checked) next(); }
    
    let p2c = 100; function p2Click() { p2c--; document.getElementById('p2-v').innerText = p2c; if(p2c <= 0) next(); }

    function p3Check() { if(document.getElementById('p3-i').value.toLowerCase() === "i am a documented goner") next(); }

    let p4t = 20, p4int; const p4h = () => document.getElementById('p4-h');
    document.addEventListener('mousedown', (e) => {
        if(e.target.id === 'p4-h') {
            p4int = setInterval(() => { p4t--; document.getElementById('p4-t').innerText = p4t; if(p4t <= 0) { clearInterval(p4int); next(); } }, 1000);
        }
    });
    document.addEventListener('mouseup', () => { clearInterval(p4int); p4t = 20; if(document.getElementById('p4-t')) document.getElementById('p4-t').innerText = 20; });

    function setupMastersGrid() {
        const g = document.getElementById('p5-g');
        masters.forEach(m => {
            const b = document.createElement('button'); b.className = 'btn'; b.innerText = m;
            b.onclick = () => next(); g.appendChild(b);
        });
    }

    function setupStains() {
        const g = document.getElementById('p6-g'); let c = 0;
        for(let i=0; i<15; i++) {
            const s = document.createElement('div');
            s.style.cssText = `position:absolute; width:30px; height:30px; background:var(--toy-pink); border-radius:50%; opacity:0.4; left:${Math.random()*90}%; top:${Math.random()*90}%; cursor:pointer;`;
            s.onclick = () => { s.remove(); c++; if(c === 15) next(); };
            g.appendChild(s);
        }
    }

    // P7 Drag
    document.addEventListener('dragover', (e) => e.preventDefault());
    document.addEventListener('drop', (e) => { if(e.target.id === 'p7-t') next(); });

    // P8 Slider
    document.addEventListener('input', (e) => {
        if(e.target.id === 'p8-s') {
            document.getElementById('p8-v').innerText = e.target.value + '%';
            document.getElementById('p8-b').disabled = (e.target.value != 100);
        }
        if(e.target.id === 'p10-i' && e.target.value.toLowerCase() === 'leaking') {
            let v = document.getElementById('p10-v'); let c = parseInt(v.innerText) + 1;
            v.innerText = `${c} / 10`; e.target.value = ''; if(c >= 10) next();
        }
        if(e.target.id === 'p22-i' && e.target.value.toLowerCase() === 'i am a messy toy') {
            let v = document.getElementById('p22-v'); let c = parseInt(v.innerText) + 1;
            v.innerText = `${c} / 10`; e.target.value = ''; if(c >= 10) next();
        }
    });

    // P9 Stare
    let p9t = 15, p9int; function startPhase9() {
        p9int = setInterval(() => { p9t--; document.getElementById('p9-t').innerText = p9t; if(p9t <= 0) { clearInterval(p9int); next(); } }, 1000);
        window.onmousemove = () => { if(currentPhase === 9) { p9t = 15; document.getElementById('p9-t').innerText = 15; } };
    }

    function setupTinyGrid() {
        const g = document.getElementById('p11-g');
        for(let i=0; i<100; i++) {
            const d = document.createElement('div'); d.className = 'dot';
            d.onclick = () => { if(i === 69) next(); else alert('Wrong grovel point.'); };
            g.appendChild(d);
        }
    }

    function p12Check() { if(document.getElementById('p12-i').value.toLowerCase() === 'cellbit') next(); }

    let p13c = 168; function p13Click() { p13c--; document.getElementById('p13-v').innerText = p13c; if(p13c <= 0) next(); }

    function startPhase14() { setTimeout(() => { let b = document.getElementById('p14-b'); b.disabled = false; b.innerText = "OBEY"; }, 7000); }

    function p15Check() { if(document.getElementById('p15-i').value.toLowerCase() === "my brain is mush") next(); }
    function p16Check() { if(document.getElementById('p16-i').value.toLowerCase() === "sapnap is my master") next(); }

    setInterval(() => { if(currentPhase === 17) { let b = document.getElementById('p17-b'); b.style.opacity -= 0.01; if(b.style.opacity <= 0) location.reload(); } }, 100);

    function setupAckGrid() {
        const g = document.getElementById('p18-g');
        masters.forEach(m => {
            const l = document.createElement('label');
            l.innerHTML = `<input type="checkbox" class="p18-c"> ${m}`;
            g.appendChild(l);
        });
        g.onchange = () => { if(document.querySelectorAll('.p18-c:checked').length === 15) document.getElementById('p18-b').disabled = false; };
    }

    let p19c = 0; function p19Click() {
        p19c++; if(p19c >= 5) next();
        else { let b = document.getElementById('p19-b'); b.style.left = Math.random()*80+'%'; b.style.top = Math.random()*80+'%'; }
    }

    function p20Roll() { let r = Math.floor(Math.random()*20)+1; document.getElementById('p20-v').innerText = r; if(r === 20) setTimeout(next, 1000); }

    let p21t = 40, p21int;
    document.addEventListener('mousedown', (e) => {
        if(e.target.id === 'p21-h') {
            p21int = setInterval(() => { p21t--; document.getElementById('p21-t').innerText = p21t; if(p21t <= 0) { clearInterval(p21int); next(); } }, 1000);
        }
    });
    document.addEventListener('mouseup', () => { clearInterval(p21int); p21t = 40; if(document.getElementById('p21-t')) document.getElementById('p21-t').innerText = 40; });

    function p24Check() { if(document.getElementById('p24-i').value.toLowerCase().includes('cellbit')) next(); }

    let p25_l = 0; document.addEventListener('click', (e) => {
        if(e.target.classList.contains('p25-b')) {
            let now = Date.now(); if(now - p25_l < 100 && p25_l !== 0) next(); p25_l = now;
        }
    });

    function p26Check() { if(document.getElementById('p26-i').value.toLowerCase() === 'goner') next(); }

    function startPhase27() { let t = 30; let int = setInterval(() => { t--; document.getElementById('p27-t').innerText = t; if(t <= 0) { clearInterval(int); next(); } }, 1000); }
    function startPhase29() { let t = 60; let int = setInterval(() => { t--; document.getElementById('p29-t').innerText = t; if(t <= 0) { clearInterval(int); next(); } }, 1000); }

    function finalReset() {
        const time = new Date().getTime() + (7 * 24 * 60 * 60 * 1000);
        localStorage.setItem('lockdown_end', time);
        alert("RESET LOGGED. THE CAGE IS LOCKED. SEE YOU IN 168 HOURS.");
        window.location.href = 'index.html';
    }

    // LAUNCH
    window.onload = initGauntlet;

</script>
</body>
</html>
