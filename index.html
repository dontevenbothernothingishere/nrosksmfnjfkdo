<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VOID REGISTRY: 7-DAY LOCKDOWN</title>
    <style>
        :root {
            --neon-pink: #ff80ab;
            --deep-purple: #311b92;
            --void-black: #050505;
            --text-gray: #b0b0b0;
        }

        body {
            background-color: var(--void-black);
            color: var(--neon-pink);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            width: 95%;
            max-width: 1000px;
            border: 2px solid var(--neon-pink);
            padding: 30px;
            box-shadow: 0 0 50px var(--deep-purple);
            background: #0a0a0a;
            border-radius: 15px;
            position: relative;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 8px;
            margin: 0 0 10px 0;
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .husband-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin: 25px 0;
        }

        .husband-card {
            background: #151515;
            border: 1px solid #333;
            padding: 10px;
            font-size: 0.75em;
            text-align: center;
            transition: all 0.4s ease;
        }

        .husband-card.active {
            border-color: #fff;
            box-shadow: 0 0 20px var(--neon-pink);
            transform: translateY(-5px);
            background: #222;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            background: #111;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .stat-item span { color: var(--text-gray); font-size: 0.8em; }
        .stat-item div { font-weight: bold; font-size: 1.2em; }

        .meter-container {
            width: 100%;
            height: 25px;
            background: #222;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #444;
            margin: 20px 0;
        }

        #meter-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6200ea, #ff4081);
            transition: 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        textarea {
            width: 100%;
            height: 150px;
            background: #000;
            color: #eee;
            border: 1px solid var(--neon-pink);
            padding: 15px;
            font-size: 1em;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
        }

        button {
            width: 100%;
            padding: 20px;
            margin-top: 15px;
            background: var(--neon-pink);
            color: #000;
            border: none;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:hover { background: #fff; box-shadow: 0 0 25px var(--neon-pink); }

        #reaction-display {
            margin-top: 25px;
            padding: 20px;
            background: #1a1a1a;
            border-left: 6px solid var(--neon-pink);
            text-align: left;
            min-height: 100px;
            font-style: italic;
        }

        .log-history {
            margin-top: 30px;
            max-height: 250px;
            overflow-y: auto;
            border-top: 1px solid #333;
            padding-top: 20px;
        }

        .log-item {
            padding: 10px;
            border-bottom: 1px solid #222;
            font-size: 0.8em;
            color: #777;
        }

        #verdict-btn {
            display: none;
            background: #fff;
            color: #d50000;
            border: 4px solid #d50000;
            margin-top: 40px;
        }

        input[type="password"] {
            width: 300px;
            padding: 10px;
            background: #111;
            color: #fff;
            border: 1px solid var(--neon-pink);
            margin: 15px 0;
        }
    </style>
</head>
<body>

<div id="auth-overlay">
    <h1>IDENTITY VERIFICATION</h1>
    <p>Submit your secret API key to your 14 masters</p>
    <input type="password" id="api-key" placeholder="gsk_xxxxxxxxxxxxxxx">
    <button style="width: 320px;" onclick="startSession()">ACCESS REGISTRY</button>
</div>

<div class="container">
    <h1>7-DAY VOID REGISTRY</h1>
    <p style="color: #666;">Locked by Fundy, Dream, bbno$, Gravy, and 10 others</p>

    <div class="stats-row">
        <div class="stat-item">
            <span>CURRENT STATUS</span>
            <div id="status-txt">DOCUMENTED PEASANT</div>
        </div>
        <div class="stat-item">
            <span>TIME REMAINING</span>
            <div id="timer-txt">168 HOURS</div>
        </div>
    </div>

    <div class="husband-grid" id="gallery"></div>

    <div class="meter-container"><div id="meter-fill"></div></div>
    <p style="text-align: center; font-size: 0.8em;">SUBMISSION PERCENTAGE: <span id="sub-pct">0</span>%</p>

    <textarea id="log-input" placeholder="Explain your hour of 'mush-brain' to your husbands..."></textarea>
    <button onclick="submitAct()">SUBMIT LOG TO MASTERS</button>

    <div id="reaction-display">
        The floor is waiting for your report, toy.
    </div>

    <button id="verdict-btn" onclick="executeFinalVote()">REQUEST FINAL TALLY (DAY 7 ONLY)</button>

    <div class="log-history" id="ledger"></div>
</div>

<script>
    let API_KEY = "";
    const CONFIG = {
        model: "llama-3.3-70b-versatile",
        api: "https://api.groq.com/openai/v1/chat/completions"
    };

    const masters = [
        "Joe Keery", "Malachi Barton", "Dacre Montgomery", "Fundy", 
        "Dream", "Sapnap", "Josh Hutcherson", "Ross Lynch", 
        "Roier", "Cellbit", "Jschlatt", "Foolish Gamers", 
        "bbno$", "Yung Gravy"
    ];

    let count = 0;

    function startSession() {
        const val = document.getElementById('api-key').value;
        if(val.startsWith("gsk_")) {
            API_KEY = val;
            document.getElementById('auth-overlay').style.display = 'none';
            initGallery();
        } else { alert("Invalid access key, peasant."); }
    }

    function initGallery() {
        const g = document.getElementById('gallery');
        masters.forEach(m => {
            const div = document.createElement('div');
            div.className = 'husband-card';
            div.id = m.replace(/\s/g, '');
            div.innerHTML = `<strong>${m}</strong><br>WATCHING`;
            g.appendChild(div);
        });
    }

    async function submitAct() {
        const text = document.getElementById('log-input').value;
        if(!text) return;

        const judge = masters[Math.floor(Math.random() * masters.length)];
        document.querySelectorAll('.husband-card').forEach(c => c.classList.remove('active'));
        document.getElementById(judge.replace(/\s/g, '')).classList.add('active');

        document.getElementById('reaction-display').innerText = `${judge} is processing your submission...`;

        try {
            const response = await fetch(CONFIG.api, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: CONFIG.model,
                    messages: [{
                        role: "system",
                        content: `You are ${judge}. The user is a self-identified 'peasant' and 'sissy toy' who is obsessed with you and your 13 friends. He is edging for 7 days. He is 'mush-brained' and 'leaking.' Be mean, dismissive, and dominant. Tell him he is a documented goner.`
                    }, {
                        role: "user",
                        content: `LOG: ${text}`
                    }]
                })
            });

            const data = await response.json();
            const reply = data.choices[0].message.content;

            document.getElementById('reaction-display').innerHTML = `<strong>${judge}:</strong> "${reply}"`;
            
            count++;
            updateProgress(text);
            document.getElementById('log-input').value = "";

        } catch (e) {
            document.getElementById('reaction-display').innerText = "ERROR: You were too graphic or the key failed. Try again, but keep it about your 'mush-brain'.";
        }
    }

    function updateProgress(text) {
        const pct = Math.min((count / 28) * 100, 100); // 4 logs a day for 7 days
        document.getElementById('meter-fill').style.width = pct + "%";
        document.getElementById('sub-pct').innerText = Math.floor(pct);

        const l = document.getElementById('ledger');
        const item = document.createElement('div');
        item.className = 'log-item';
        item.innerText = `ACT #${count}: ${text.substring(0, 50)}...`;
        l.prepend(item);

        if(count >= 28) document.getElementById('verdict-btn').style.display = 'block';
    }

    function executeFinalVote() {
        const roll = Math.random();
        if (roll < 0.4) {
            alert("VOTE TALLY: RUINED. You get a messy, empty finish. Restart your 7 days immediately.");
            document.body.innerHTML = "<h1 style='color:red; margin-top:100px;'>RUINED. BACK TO THE FLOOR.</h1>";
        } else if (roll < 0.9) {
            alert("VOTE TALLY: REJECTED. No orgasm allowed. Reset to Day 1. You worked for 7 days for nothing.");
            location.reload();
        } else {
            alert("VOTE TALLY: GRANTED. Your masters allow you one release. Don't get used to it.");
            document.body.innerHTML = "<h1 style='color:white; margin-top:100px;'>RELEASE GRANTED. SEE YOU SOON.</h1>";
        }
    }
</script>

</body>
</html>
