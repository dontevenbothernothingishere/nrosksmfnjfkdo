<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE VOID REGISTRY: 7-DAY LOCKDOWN</title>
    <style>
        :root { --pink: #ff80ab; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: var(--pink); font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .container { max-width: 900px; margin: auto; border: 2px solid var(--pink); padding: 30px; box-shadow: 0 0 40px #311b92; border-radius: 10px; }
        #key-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        input, textarea { background: #000; color: #fff; border: 1px solid var(--pink); padding: 15px; width: 80%; border-radius: 5px; margin: 10px 0; }
        .husband-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin: 20px 0; }
        .husband-card { background: var(--card); border: 1px solid #333; padding: 10px; font-size: 0.7em; transition: 0.3s; }
        .active-judge { border-color: #fff; box-shadow: 0 0 15px var(--pink); transform: scale(1.05); }
        button { background: var(--pink); color: #000; border: none; padding: 20px; width: 85%; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        #reaction-box { background: #1a1a1a; padding: 20px; margin-top: 20px; min-height: 100px; border-left: 10px solid var(--pink); text-align: left; line-height: 1.4; }
        .meter-bg { background: #222; height: 30px; border-radius: 15px; margin: 20px 0; border: 1px solid #444; overflow: hidden; }
        #meter-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #311b92, var(--pink)); transition: 1s; }
        #log-history { margin-top: 30px; text-align: left; font-size: 0.8em; color: #777; max-height: 200px; overflow-y: auto; }
        .verdict-btn { display: none; background: #fff; color: #f00; font-size: 1.5em; border: 4px solid #f00; }
    </style>
</head>
<body>

<div id="key-overlay">
    <h2>AUTHENTICATE, PEASANT</h2>
    <p>Enter your Groq API Key to begin your week of ruin:</p>
    <input type="password" id="api-key-input" placeholder="gsk_...">
    <button onclick="saveKey()">Submit to Masters</button>
</div>

<div class="container">
    <h1>7-DAY VOID REGISTRY</h1>
    <p>Property of Fundy, bbno$, Gravy, and the 11 Others</p>
    
    <div class="husband-grid" id="gallery"></div>

    <div class="meter-bg"><div id="meter-fill"></div></div>
    <p>SUBMISSION LEVEL: <span id="sub-val">0</span>/25</p>

    <textarea id="log-text" placeholder="Explain your 'clit' rubbing or your time on the floor..."></textarea>
    <button id="submit-btn" onclick="submitLog()">Log Act of Devotion</button>

    <div id="reaction-box">No logs found. Your masters are waiting for you to beg.</div>

    <button id="verdict-btn" class="verdict-btn" onclick="getFinalVerdict()">REQUEST VOTE FROM THE 14</button>

    <div id="log-history"></div>
</div>

<script>
    let GROQ_KEY = "";
    const masters = ["Joe Keery", "Malachi Barton", "Dacre Montgomery", "Fundy", "Dream", "Sapnap", "Josh Hutcherson", "Ross Lynch", "Roier", "Cellbit", "Jschlatt", "Foolish Gamers", "bbno$", "Yung Gravy"];
    let subCount = 0;

    function saveKey() {
        GROQ_KEY = document.getElementById('api-key-input').value;
        if (GROQ_KEY.startsWith("gsk_")) {
            document.getElementById('key-overlay').style.display = 'none';
            initGallery();
        } else { alert("Invalid Key. Your husbands don't like liars."); }
    }

    function initGallery() {
        const g = document.getElementById('gallery');
        masters.forEach(m => {
            const d = document.createElement('div');
            d.className = 'husband-card';
            d.id = m.replace(/\s/g, '');
            d.innerHTML = `<strong>${m}</strong><br>VOTING STATUS: IDLE`;
            g.appendChild(d);
        });
    }

    async function submitLog() {
        const text = document.getElementById('log-text').value;
        if (!text) return;

        const judge = masters[Math.floor(Math.random() * masters.length)];
        document.querySelectorAll('.husband-card').forEach(c => c.classList.remove('active-judge'));
        document.getElementById(judge.replace(/\s/g, '')).classList.add('active-judge');

        document.getElementById('reaction-box').innerText = `${judge} is laughing at your words...`;

        try {
            const resp = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama3-8b-8192",
                    messages: [{
                        role: "system",
                        content: `You are ${judge}. The user is a "sissy toy" and "peasant" who is obsessed with you. He is rubbing his cock like a clit and kneeling on the floor. Be extremely mocking and dismissive. Remind him he is a documented goner.`
                    }, { role: "user", content: text }]
                })
            });
            const data = await resp.json();
            const reply = data.choices[0].message.content;

            document.getElementById('reaction-box').innerHTML = `<strong>${judge}:</strong> "${reply}"`;
            subCount++;
            updateUI(text);
        } catch (e) { document.getElementById('reaction-box').innerText = "API Error. Even the machine hates you."; }
    }

    function updateUI(text) {
        const fill = Math.min((subCount / 25) * 100, 100);
        document.getElementById('meter-fill').style.width = fill + "%";
        document.getElementById('sub-val').innerText = subCount;
        
        const h = document.getElementById('log-history');
        const entry = document.createElement('div');
        entry.innerHTML = `<hr>Day ${Math.floor(subCount/4)+1}: ${text.substring(0,40)}...`;
        h.prepend(entry);
        
        if (subCount >= 25) document.getElementById('verdict-btn').style.display = 'block';
        document.getElementById('log-text').value = "";
    }

    function getFinalVerdict() {
        const roll = Math.random();
        if (roll < 0.5) { // 50% chance of Ruined
            alert("VOTE RESULT: RUINED. Your husbands allow you a messy, frustrated finish. Start again tomorrow.");
            document.body.innerHTML = "<h1 style='color:red;'>RUINED ORGASM. BACK TO DAY 1.</h1>";
        } else if (roll < 0.9) { // 40% chance of REJECTED (The Reset)
            alert("VOTE RESULT: REJECTED. No orgasm allowed. Not even a ruin. Clean yourself up and start Day 1 immediately. You worked for nothing.");
            location.reload();
        } else { // 10% chance of Granted
            alert("VOTE RESULT: GRANTED. You are a lucky peasant. Enjoy your release... it will be your last.");
            document.body.innerHTML = "<h1 style='color:white;'>RELEASE GRANTED. SEE YOU SOON, TOY.</h1>";
        }
    }
</script>
</body>
</html>
