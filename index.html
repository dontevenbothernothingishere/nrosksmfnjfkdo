<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VOID REGISTRY: 7-DAY LOCKDOWN</title>
    <style>
        :root {
            --neon-pink: #ff80ab;
            --deep-purple: #311b92;
            --void-black: #050505;
            --text-gray: #b0b0b0;
            --warning-red: #ff1744;
        }

        body {
            background-color: var(--void-black);
            color: var(--neon-pink);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            width: 95%;
            max-width: 1000px;
            border: 2px solid var(--neon-pink);
            padding: 30px;
            box-shadow: 0 0 50px var(--deep-purple);
            background: #0a0a0a;
            border-radius: 15px;
            position: relative;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 8px;
            margin: 0 0 10px 0;
            text-shadow: 0 0 10px var(--neon-pink);
            text-align: center;
        }

        .husband-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin: 25px 0;
        }

        .husband-card {
            background: #151515;
            border: 1px solid #333;
            padding: 10px;
            font-size: 0.7em;
            text-align: center;
            transition: all 0.4s ease;
            border-radius: 8px;
        }

        .husband-card img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-bottom: 8px;
            border: 1px solid #444;
            object-fit: cover;
        }

        .husband-card.active {
            border-color: #fff;
            box-shadow: 0 0 25px var(--neon-pink);
            transform: scale(1.05);
            background: #222;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            background: #111;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #222;
        }

        .stat-item span { color: var(--text-gray); font-size: 0.8em; }
        .stat-item div { font-weight: bold; font-size: 1.2em; color: #fff; }

        textarea {
            width: 100%;
            height: 120px;
            background: #000;
            color: #eee;
            border: 1px solid var(--neon-pink);
            padding: 15px;
            font-size: 1em;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
            resize: none;
        }

        button {
            width: 100%;
            padding: 20px;
            margin-top: 15px;
            background: var(--neon-pink);
            color: #000;
            border: none;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #reset-btn {
            background: var(--warning-red);
            color: #fff;
            padding: 10px;
            font-size: 0.8em;
            margin-top: 10px;
            border-radius: 5px;
            letter-spacing: 1px;
        }

        #reaction-display {
            margin-top: 25px;
            padding: 20px;
            background: #1a1a1a;
            border-left: 6px solid var(--neon-pink);
            text-align: left;
            min-height: 80px;
            font-style: italic;
            color: #fff;
        }

        #verdict-btn {
            background: #fff;
            color: #000;
            margin-top: 30px;
            display: none; 
        }
    </style>
</head>
<body>

<div id="auth-overlay">
    <h1>IDENTITY VERIFICATION</h1>
    <p>Submit your secret API key to your 15 masters</p>
    <input type="password" id="api-key" style="width: 300px; padding: 10px; background: #111; color: #fff; border: 1px solid var(--neon-pink); margin: 15px 0;" placeholder="gsk_xxxxxxxxxxxxxxx">
    <button style="width: 320px;" onclick="startSession()">ACCESS REGISTRY</button>
</div>

<div class="container">
    <h1>7-DAY VOID REGISTRY</h1>
    
    <div class="stats-row">
        <div class="stat-item">
            <span>REGISTRY STATUS</span>
            <div id="status-txt">DOCUMENTED GONER</div>
        </div>
        <div class="stat-item">
            <span>SENTENCE REMAINING</span>
            <div id="timer-txt">CALCULATING...</div>
        </div>
    </div>

    <div class="husband-grid" id="gallery"></div>

    <textarea id="log-input" placeholder="Submit your 'mush-brain' report..."></textarea>
    <button onclick="submitAct()">SUBMIT LOG TO MASTERS</button>
    
    <button id="reset-btn" onclick="goToReset()">RESET TIMER & SELF-REPORT FAILURE</button>

    <div id="reaction-display">Waiting for your submission, toy.</div>

    <button id="verdict-btn" onclick="executeFinalVote()">GO TO JUDGMENT HALL</button>
</div>

<script>
    let API_KEY = localStorage.getItem('saved_api_key') || "";
    const GITHUB_BASE = "https://raw.githubusercontent.com/dontevenbothernothingishere/nrosksmfnjfkdo/main/";

        const masters = [
        { name: "Joe Keery", context: "Actor (Stranger Things), known for hair and style.", img: "joe.jpg" },
        { name: "Pearce Joza", context: "Actor (Zombies), part of the inner circle.", img: "pearce.jpg" },
        { name: "Malachi Barton", context: "Actor, friend of the group.", img: "malachi.jpg" },
        { name: "Dacre Montgomery", context: "Actor (Billy in Stranger Things), aggressive and dominant.", img: "dacre.jpg" },
        { name: "Fundy", context: "Minecraft Streamer, leader of the pack.", img: "fundy.jpg" },
        { name: "Dream", context: "Minecraft Streamer, masked and mysterious.", img: "dream.jpg" },
        { name: "Sapnap", context: "Minecraft Streamer, part of the Dream Team.", img: "sapnap.jpg" },
        { name: "Josh Hutcherson", context: "Actor, classic heartthrob master.", img: "josh.jpg" },
        { name: "Ross Lynch", context: "Actor/Musician, blonde and dominant.", img: "ross.jpg" },
        { name: "Roier", context: "Streamer, QSMP member, bilingual control.", img: "roier.jpg" },
        { name: "Cellbit", context: "Streamer, QSMP, logical and cold.", img: "cellbit.jpg" },
        { name: "Jschlatt", context: "Streamer/Business man, loud and dismissive.", img: "schlatt.jpg" },
        { name: "Foolish Gamers", context: "Streamer, shark-themed dominance.", img: "foolish.jpg" },
        { name: "bbno$", context: "Musician, confident and stylish.", img: "bbno.jpg" },
        { name: "Yung Gravy", context: "Musician, tall and smooth master.", img: "gravy.jpg" },
        { name: "Astral Spiff", context: "Streamer/YouTuber, analytical, strict, and knows exactly how to break you.", img: "spiff.jpg" }
    ];

    window.onload = function() {
        if(API_KEY) {
            document.getElementById('auth-overlay').style.display = 'none';
            initGallery();
        }
        updateTimer();
    };

    let endTime = localStorage.getItem('lockdown_end');
    if (!endTime) {
        endTime = new Date().getTime() + (7 * 24 * 60 * 60 * 1000);
        localStorage.setItem('lockdown_end', endTime);
    }

    function updateTimer() {
        const now = new Date().getTime();
        const diff = endTime - now;
        if (diff <= 0) {
            document.getElementById('timer-txt').innerText = "SENTENCE COMPLETE";
            document.getElementById('verdict-btn').style.display = 'block';
            return;
        }
        const h = Math.floor(diff / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);
        document.getElementById('timer-txt').innerText = `${h}h ${m}m ${s}s`;
    }
    setInterval(updateTimer, 1000);

    function startSession() {
        const val = document.getElementById('api-key').value;
        if(val.startsWith("gsk_")) {
            API_KEY = val;
            localStorage.setItem('saved_api_key', API_KEY);
            document.getElementById('auth-overlay').style.display = 'none';
            initGallery();
        } else { alert("Invalid access key."); }
    }

    function initGallery() {
        const g = document.getElementById('gallery');
        g.innerHTML = "";
        masters.forEach(m => {
            const div = document.createElement('div');
            div.className = 'husband-card';
            div.id = m.name.replace(/\s/g, '');
            div.innerHTML = `<img src="${GITHUB_BASE}${m.img}" onerror="this.src='https://via.placeholder.com/60'">
                             <br><strong>${m.name}</strong>`;
            g.appendChild(div);
        });
    }

    function goToReset() {
        window.location.href = 'failure.html';
    }

    async function submitAct() {
        const text = document.getElementById('log-input').value;
        if(!text || !API_KEY) return;

        const master = masters[Math.floor(Math.random() * masters.length)];
        document.querySelectorAll('.husband-card').forEach(c => c.classList.remove('active'));
        document.getElementById(master.name.replace(/\s/g, '')).classList.add('active');

        document.getElementById('reaction-display').innerText = `${master.name} is reading your pathetic log...`;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{
                        role: "system",
                        content: `You are ${master.name}. Context: ${master.context}. The user is your 'documented goner.' He is on a 7-day edging sentence. Be mean, dismissive, and remind him he is a toy.`
                    }, { role: "user", content: `LOG: ${text}` }]
                })
            });
            const data = await response.json();
            document.getElementById('reaction-display').innerHTML = `<strong>${master.name}:</strong> "${data.choices[0].message.content}"`;
            document.getElementById('log-input').value = "";
        } catch (e) { document.getElementById('reaction-display').innerText = "ERROR. Try again."; }
    }

    function executeFinalVote() {
        window.location.href = 'verdict.html';
    }
</script>
</body>
</html>
